<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="iCare Virtual Hospital">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="iCare">
  <meta http-equiv="Content-Security-Policy" content="img-src 'self' data: https: http:;">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>iCare Virtual Hospital</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background: #ffffff; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #ffffff; z-index: 9999;
    }
    #loading img { width: 120px; height: 120px; object-fit: contain; }
    #loading .spinner {
      margin-top: 24px; width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #0036BC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icons/Icon-192.png" alt="iCare">
    <div class="spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
